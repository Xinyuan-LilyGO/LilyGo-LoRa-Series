boards_dir = boards

extra_configs =
  	variants/t3-series/platformio.ini
  	variants/tbeam-series/platformio.ini

[env]
platform = espressif32@6.13.0
framework = arduino
upload_speed =  921600
monitor_speed = 115200
monitor_filters =
    time
	default
	esp32_exception_decoder
build_flags =
    -DWIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -DWIFI_PASSWORD=\"${sysenv.WIFI_PASSWORD}\"
    -DWIFI_SSID2=\"${sysenv.WIFI_SSID2}\"
    -DWIFI_PASSWORD2=\"${sysenv.WIFI_PASSWORD2}\"
board_build.partitions = huge_app.csv 

[esp32]
extends = env
build_flags =
    ${env.build_flags}

[esp32s3]
extends = env
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; -UARDUINO_USB_CDC_ON_BOOT
    -DCORE_DEBUG_LEVEL=0

[esp32_psram]
extends = esp32
build_flags = 
    ${esp32.build_flags}
    -mfix-esp32-psram-cache-issue
    -DBOARD_HAS_PSRAM

; ======================= T3 series ===============================;


[env:T3_V1_3_SX1276]
extends = esp32
board = esp32dev
build_flags = ${esp32.build_flags}
    -DT3_V1_3_SX1276

